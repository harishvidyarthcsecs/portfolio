<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Biswapped Network — Harish's research specialty -->
  <!-- Bottom layer edges -->
  <line x1="38" y1="148" x2="100" y2="148" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="148" x2="162" y2="148" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Top layer edges -->
  <line x1="54" y1="60" x2="100" y2="60" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="146" y2="60" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Cross edges (biswapped connections) -->
  <path d="M38,148 C42,104 58,80 54,60" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M162,148 C158,104 142,80 146,60" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M38,148 C70,120 86,88 100,60" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" fill="none"/>
  <path d="M162,148 C130,120 114,88 100,60" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" fill="none"/>
  <path d="M54,60 C70,100 70,112 100,148" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" fill="none"/>
  <path d="M146,60 C130,100 130,112 100,148" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" fill="none"/>
  <!-- Wiener index label -->
  <text x="100" y="110" font-family="monospace" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="700" opacity="0.5">W(G)</text>
  <!-- Bottom nodes -->
  <circle cx="38" cy="148" r="16" fill="#dcec9d" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="100" cy="148" r="16" fill="#dcec9d" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="162" cy="148" r="16" fill="#dcec9d" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Top nodes -->
  <circle cx="54" cy="60" r="16" fill="#a8c4f8" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="100" cy="60" r="16" fill="#a8c4f8" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="146" cy="60" r="16" fill="#a8c4f8" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Node dots -->
  <circle cx="38" cy="148" r="5" fill="#1a1a1a"/>
  <circle cx="100" cy="148" r="5" fill="#1a1a1a"/>
  <circle cx="162" cy="148" r="5" fill="#1a1a1a"/>
  <circle cx="54" cy="60" r="5" fill="#1a1a1a"/>
  <circle cx="100" cy="60" r="5" fill="#1a1a1a"/>
  <circle cx="146" cy="60" r="5" fill="#1a1a1a"/>
</svg>
