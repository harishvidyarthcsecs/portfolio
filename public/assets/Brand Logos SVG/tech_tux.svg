<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Classic Tux — sitting pose, accurate mascot proportions -->

  <!-- Body (black, egg-shaped) -->
  <ellipse cx="100" cy="148" rx="62" ry="66" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>

  <!-- White belly (classic Tux teardrop belly) -->
  <path d="M68,118 Q72,92 100,88 Q128,92 132,118 Q138,152 120,172 Q112,180 100,180 Q88,180 80,172 Q62,152 68,118Z" fill="#faf7f4"/>

  <!-- Left wing -->
  <path d="M38,120 Q12,106 16,154 Q26,174 50,158 Z" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <!-- Right wing -->
  <path d="M162,120 Q188,106 184,154 Q174,174 150,158 Z" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>

  <!-- Head (round, black) -->
  <circle cx="100" cy="68" r="48" fill="#1a1a1a"/>

  <!-- Yellow face patch (classic Tux golden/yellow oval) -->
  <ellipse cx="100" cy="74" rx="30" ry="28" fill="#FFD04A"/>

  <!-- Eyes — big, expressive, slightly inward -->
  <circle cx="87" cy="62" r="13" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="113" cy="62" r="13" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Pupils -->
  <circle cx="89" cy="65" r="7" fill="#1a1a1a"/>
  <circle cx="115" cy="65" r="7" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="92" cy="62" r="2.5" fill="white"/>
  <circle cx="118" cy="62" r="2.5" fill="white"/>

  <!-- Beak (classic Tux orange-yellow triangle beak) -->
  <path d="M88,84 Q100,98 112,84 Q100,78 88,84Z" fill="#FF9B00" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Feet (big flat Tux feet, orange) -->
  <!-- Left foot -->
  <ellipse cx="76" cy="208" rx="22" ry="9" fill="#FF9B00" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(-10, 76, 208)"/>
  <rect x="60" y="196" width="18" height="16" rx="4" fill="#FF9B00" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Right foot -->
  <ellipse cx="124" cy="208" rx="22" ry="9" fill="#FF9B00" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(10, 124, 208)"/>
  <rect x="122" y="196" width="18" height="16" rx="4" fill="#FF9B00" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Belly button shadow (subtle) -->
  <ellipse cx="100" cy="148" rx="18" ry="10" fill="#e0dbd4" opacity="0.5"/>
</svg>
