<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- HTML5 — orange badge sticker style -->
  <g transform="rotate(3, 100, 100)">
    <!-- Shield/badge shape -->
    <path d="M20,20 L180,20 L164,172 L100,190 L36,172 Z" fill="#E44D26" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Inner lighter panel -->
    <path d="M36,36 L164,36 L150,158 L100,172 L50,158 Z" fill="#F16529" stroke="none"/>
    <!-- "5" badge top-right -->
    <circle cx="158" cy="44" r="18" fill="#faf7f4" stroke="#1a1a1a" stroke-width="3"/>
    <text x="158" y="51" font-family="'Arial Black', sans-serif" font-size="20" font-weight="900" fill="#E44D26" text-anchor="middle">5</text>
    <!-- </ > symbol -->
    <text x="100" y="128" font-family="'Courier New', monospace" font-size="46" font-weight="900" fill="#faf7f4" text-anchor="middle">&lt;/&gt;</text>
  </g>
</svg>
